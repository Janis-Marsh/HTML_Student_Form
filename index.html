<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body{
            background-color: #eee;
        }
        .container{
            width: 350px;
            height: 450px;
            background-color: white;
            padding: 15px;
            border: 2px solid lightgray;
            border-radius: 10px;
            margin: 0 auto;
        }
        h1{
            text-align: center;
        }
        input{
            border-radius: 5px;
            padding: 5px;
            border: 2px solid lightgray;
            width: 340px;
        }
        
        label{
            font-weight: bold;
            color: rgb(44, 44, 44);
        }
        textarea{
            width: 100%;
        }
        button{
            width: 350px;
            margin-top: 15px;
            background-color: rgb(2, 165, 2);
            color: white;
            padding: 5px;
            border-radius: 5px;
            border: 2px solid rgb(1, 139, 1);
        }
        button:hover{
            cursor: pointer;
            color: rgb(2, 165, 2);
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Registration Form</h1>
        <form>
            <label for="fname">Full Name:</label>
            <br />
            <input type="text" name="fname" id="fname" placeholder="Enter your name" tabindex="1" accesskey="n">
            <br />
            <br />
            <label for="email">Email Address:</label>
            <br />
            <input type="email" name="email" id="email" placeholder="example@email.com" tabindex="2" accesskey="e" required>
            <br />
            <br />
            <label for="course">Course Name:</label>
            <br />
            <input type="text" name="course" id="course" placeholder="Enter your course name" tabindex="3" accesskey="c">
            <br />
            <br />
            <label for="message">Your Message:</label>
            <br />
            <textarea name="message" id="message" placeholder="Write your message here..." tabindex="4" accesskey="m"></textarea>
            <br />
            <button type="submit" tabindex="5" accesskey="s">Submit</button>
        </form>
    </div>
</body>
</html>
